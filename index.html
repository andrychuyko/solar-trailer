<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Solar Trailer</title>
  <style>
    body { font-family: system-ui, Arial, sans-serif; margin: 16px; }
    .row { margin: 10px 0; }
    button { padding: 10px 14px; font-size: 16px; }
    input { padding: 8px; font-size: 16px; }
    .card { border: 1px solid #ddd; border-radius: 10px; padding: 12px; margin-top: 12px; }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    small { color: #555; }
  </style>
</head>
<body>
  <h2>Ориентация и наклон солнечных панелей</h2>

  <div class="row">
    <button onclick="getLocation()">Определить место</button>
  </div>

  <div class="row">
    <label>Дата: <input id="date" type="date"></label>
  </div>

  <div class="row">
    <label>Длина панели L (м): <input id="len" type="number" step="0.01" value="1.70"></label>
  </div>

  <div class="row card">
    <div>Координаты: <span id="coords" class="mono">—</span></div>
    <div style="margin-top:8px;">
      <button onclick="calc()">Рассчитать</button>
      <button onclick="openGMaps()">Открыть в Google Maps</button>
    </div>
  </div>

  <div id="out" class="card" style="display:none;"></div>

<script>
  // ---- UI state ----
  let LAT = null, LON = null;
  document.getElementById("date").valueAsDate = new Date();

  function getLocation() {
    if (!navigator.geolocation) {
      alert("Геолокация не поддерживается.");
      return;
    }
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        LAT = pos.coords.latitude;
        LON = pos.coords.longitude;
        document.getElementById("coords").textContent =
          LAT.toFixed(6) + ", " + LON.toFixed(6);
      },
      (err) => alert("Ошибка геолокации: " + err.message),
      { enableHighAccuracy: true, timeout: 15000 }
    );
  }

  function openGMaps() {
    if (LAT == null) { alert("Сначала определите место."); return; }
    const url = `https://www.google.com/maps?q=${LAT},${LON}`;
    window.open(url, "_blank");
  }

  // ---- Math helpers ----
  function sinDeg(x){ return Math.sin(x*Math.PI/180); }
  function cosDeg(x){ return Math.cos(x*Math.PI/180); }
  function tanDeg(x){ return Math.tan(x*Math.PI/180); }
  function asinDeg(x){ return (180/Math.PI)*Math.asin(x); }
  function atan2Deg(y,x){ return (180/Math.PI)*Math.atan2(y,x); }
  function norm360(deg){
    deg = deg % 360;
    if (deg < 0) deg += 360;
    return deg;
  }

  // ---- Solar helpers ----
  function dayOfYear(dateObj){
    const start = new Date(dateObj.getFullYear(), 0, 0);
    const diff = dateObj - start;
    return Math.floor(diff / 86400000);
  }

  function declinationDeg(N){
    return 23.45 * sinDeg((360/365) * (284 + N));
  }

  // altitude (correct and stable)
  function solarAltitudeDeg(latDeg, deltaDeg, Hdeg){
    const s = sinDeg(latDeg)*sinDeg(deltaDeg) + cosDeg(latDeg)*cosDeg(deltaDeg)*cosDeg(Hdeg);
    return asinDeg(Math.max(-1, Math.min(1, s)));
  }

  /**
   * Solar azimuth from NORTH clockwise (0=N, 90=E, 180=S, 270=W).
   * This formula is stable with our H definition.
   *
   * Hdeg: hour angle (deg), H=0 at solar noon, negative morning, positive afternoon.
   */
  function solarAzimuthFromNorthDeg(latDeg, deltaDeg, Hdeg){
    // azimuth from SOUTH (classic) = atan2( sinH, cosH*sinφ - tanδ*cosφ )
    // then convert to azimuth from NORTH by +180°
    const y = sinDeg(Hdeg);
    const x = cosDeg(Hdeg)*sinDeg(latDeg) - tanDeg(deltaDeg)*cosDeg(latDeg);
    const azFromSouth = atan2Deg(y, x);          // -180..+180
    const azFromNorth = norm360(azFromSouth + 180.0);
    return azFromNorth;
  }

  function optimalTilt(lat, lon, dateObj, panelAz){
    const tzOffsetHours = -dateObj.getTimezoneOffset()/60; // e.g. MSK=+3
    const lon0 = 15 * tzOffsetHours; // central meridian (rough)

    const N = dayOfYear(dateObj);
    const delta = declinationDeg(N);

    let bestTilt = 0, bestScore = -1;

    for (let tilt=0; tilt<=60; tilt+=1){
      let score = 0;

      for (let m=0; m<24*60; m+=5){
        const localHours = m/60;

        // approx solar time (no equation of time)
        const solarHours = localHours + (lon - lon0)/15;
        const H = 15 * (solarHours - 12);

        const alt = solarAltitudeDeg(lat, delta, H);
        if (alt > 0){
          const azSun = solarAzimuthFromNorthDeg(lat, delta, H);

          // incidence on tilted plane (panelAz and azSun are both from NORTH clockwise)
          const cosTheta =
            sinDeg(alt)*cosDeg(tilt) +
            cosDeg(alt)*sinDeg(tilt)*cosDeg(azSun - panelAz);

          // weight: incidence * height factor
          const w = Math.max(0, cosTheta) * Math.max(0, sinDeg(alt));
          score += w;
        }
      }

      if (score > bestScore){
        bestScore = score;
        bestTilt = tilt;
      }
    }
    return bestTilt;
  }

  function calc(){
    if (LAT == null) { alert("Сначала определите место."); return; }

    // safe local date parsing
    const dateStr = document.getElementById("date").value; // "YYYY-MM-DD"
    const parts = dateStr.split("-").map(Number);
    const dateObj = (parts.length === 3)
      ? new Date(parts[0], parts[1]-1, parts[2], 12, 0, 0)
      : new Date();

    const L = Number(document.getElementById("len").value);
    if (!(L > 0)) { alert("Введите длину панели L (м) > 0"); return; }

    // Fixed azimuth for whole day: North hemisphere -> South (180°)
    const panelAz = (LAT >= 0) ? 180 : 0;

    const tilt = optimalTilt(LAT, LON, dateObj, panelAz);
    const h = L * Math.sin(tilt * Math.PI / 180);

    const out = document.getElementById("out");
    out.style.display = "block";
    out.innerHTML = `
      <b>Результат</b><br><br>
      Ориентация прицепа: <b>${panelAz}°</b> (${panelAz===180 ? "Юг" : "Север"}) по компасу (без магнитного склонения)<br>
      Оптимальный наклон: <b>${tilt}°</b> (диапазон 0–60°)<br>
      Высота подъёма верхнего края: <b>${h.toFixed(2)} м</b><br>
      <small>Расчёт: максимум суммарной энергии за день, панель неподвижна.</small>
    `;
  }
</script>
</body>
</html>
